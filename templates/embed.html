<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed - {{ diagram.friendly_name }}</title>
    <link rel="stylesheet" href="https://unpkg.com/bpmn-js@17.0.2/dist/assets/diagram-js.css">
    <link rel="stylesheet" href="https://unpkg.com/bpmn-js@17.0.2/dist/assets/bpmn-js.css">
    <link rel="stylesheet" href="https://unpkg.com/bpmn-js@17.0.2/dist/assets/bpmn-font/css/bpmn.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background: transparent; }
        .embed-container { 
            position: relative; 
            height: 100vh; 
            width: 100vw; 
            border-radius: 5px; 
            overflow: hidden; 
            border: 1px solid #dee2e6;
            background: #fff;
        }
        .canvas-grid-bg {
            background-color: #e5e5f7 !important;
            background-image: radial-gradient(#82838c 1.2px, #e5e5f7 1.2px) !important;
            background-size: 24px 24px !important;
        }
        #canvas { height: 100%; width: 100%; outline: none; }
        .floating-action {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="embed-container">
        <div class="floating-action dropdown">
            <button class="btn btn-sm btn-light shadow-sm bg-white" type="button" id="embedOptions" data-bs-toggle="dropdown" aria-expanded="false" style="border-radius: 50%; width: 32px; height: 32px; padding: 0;">
                <i class="fa fa-ellipsis-v"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm" aria-labelledby="embedOptions" style="font-size: 0.85rem;">
                <li><a class="dropdown-item" href="#" onclick="toggleGridBackground(); return false;"><i class="fa fa-th me-2 text-primary"></i> Toggle Grid</a></li>
                <li><a class="dropdown-item" href="#" id="menu-download-bpmn"><i class="fa fa-download me-2 text-primary"></i> Download .bpmn</a></li>
                <li><a class="dropdown-item" href="#" id="menu-download-svg"><i class="fa fa-image me-2 text-primary"></i> Download as SVG</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="/embed/{{ diagram.id }}/" target="_blank"><i class="fa fa-external-link me-2 text-primary"></i> Open in Fullscreen</a></li>
            </ul>
        </div>
        <div id="canvas"></div>
    </div>
    
    <script src="https://unpkg.com/bpmn-js@17.0.2/dist/bpmn-navigated-viewer.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleGridBackground() {
            const canvasEl = document.getElementById('canvas');
            canvasEl.classList.toggle('canvas-grid-bg');
            localStorage.setItem('grid_bg', canvasEl.classList.contains('canvas-grid-bg'));
        }

        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem('grid_bg') === 'true') {
                document.getElementById('canvas').classList.add('canvas-grid-bg');
            }

            const viewer = new BpmnJS({ container: '#canvas' });
            
            fetch('/api/diagram/{{ diagram.id }}/xml')
                .then(res => res.text())
                .then(xml => viewer.importXML(xml))
                .then(() => {
                    const canvas = viewer.get('canvas');
                    canvas.zoom('fit-viewport', 'auto');
                })
                .catch(err => console.error("Error rendering diagram", err));

            // Tool binds
            document.getElementById('menu-download-bpmn').addEventListener('click', async (e) => {
                e.preventDefault();
                const { xml } = await viewer.saveXML({ format: true });
                const a = document.createElement('a');
                a.href = 'data:application/bpmn20-xml;charset=UTF-8,' + encodeURIComponent(xml);
                const safeName = '{{ diagram.friendly_name|default("process", true) }}'.toLowerCase().replace(/[^a-z0-9 _-]/gi, '').trim();
                a.download = safeName + '.bpmn';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });

            document.getElementById('menu-download-svg').addEventListener('click', async (e) => {
                e.preventDefault();
                const { svg } = await viewer.saveSVG();
                const a = document.createElement('a');
                a.href = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
                const safeName = '{{ diagram.friendly_name|default("process", true) }}'.toLowerCase().replace(/[^a-z0-9 _-]/gi, '').trim();
                a.download = safeName + '.svg';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        });
    </script>
</body>
</html>
